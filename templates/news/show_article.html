{% extends 'main/wrapper.html' %}
{% load widget_tweaks %}
{% block title %}
    {{ article.title }}
{% endblock %}
{% block content %}
        {% if article.image %}
            <div class="row justify-content-center">
            <div class="col-12 col-md-9">
                <img src="{{ article.image.url }}" class="d-block rounded-0 w-100 m-auto" alt="...">
            </div>
            </div>
        {% endif %}
        <h2 class="text-center">{{ article.title }}</h2>
        <hr>
        <p>{{ article.content|safe }}</p>
{% endblock %}
